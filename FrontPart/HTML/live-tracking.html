<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Live Bus Tracking</title>

    <link rel="stylesheet" href="../CSS/live-tracking.css">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div class="container">

    <div class="header">

        <button class="backBtn" onclick="goBack()">
            ← Dashboard
        </button>

        <h1>🚌 Live Bus Tracking</h1>

    </div>

    <div class="trackingCard">

        <div class="row">
            <span>Bus Number</span>
            <span id="busNumber">-</span>
        </div>

        <div class="row">
            <span>Status</span>
            <span id="status">-</span>
        </div>

       <div id="delaySection"
     style="
        display:none;
        margin-top:15px;
        padding:15px;
        background:#fff3cd;
        border-left:5px solid #ff9800;
        border-radius:8px;">
    <br>

    <p>

        <b style="color:#d32f2f;">

            ⚠ Delay Reason :

        </b>

        <span id="delayReason"></span>

    </p>

    <br>

    <p>

        <b style="color:#d32f2f;">

            Delay :

        </b>

        <span id="delayMinutes"></span>

    </p>

</div>

        <div class="row">
            <span>Current District</span>
            <span id="currentDistrict">-</span>
        </div>

        <div class="row">
            <span>Next District</span>
            <span id="nextDistrict">-</span>
        </div>

        <div class="row">
            <span>ETA</span>
            <span id="eta">-</span>
        </div>

        <div class="progress">

            <div class="progressBar">

                <div id="progressFill"></div>

            </div>

            <h3 id="progressText">0%</h3>

        </div>

    </div>

    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="../Js/live-tracking.js"></script>

</body>

</html>
